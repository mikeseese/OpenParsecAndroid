name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      release__nightly:
        description: Create a nightly release
        type: boolean
        required: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Fetch Parsec SDK
        run: |
          git clone --depth 1 https://github.com/MalfoyJW/parsec-sdk.git /tmp/parsec-sdk
          cd /tmp/parsec-sdk
          if [ "$(git rev-parse HEAD)" != "bcf0489ddde91e7a7c90d0a02509afa262c20f3d" ]; then
            echo "::error::Parsec SDK repo HEAD has changed from expected commit bcf0489. Please verify and update the pinned SHA."
            exit 1
          fi
          cd -
          for abi in arm64-v8a armeabi-v7a x86_64; do
            src="/tmp/parsec-sdk/sdk/android/${abi}/libparsec.so"
            if [ ! -f "$src" ]; then
              echo "::error::Missing expected SDK library: $src"
              exit 1
            fi
            mkdir -p "app/src/main/jniLibs/${abi}"
            cp "$src" "app/src/main/jniLibs/${abi}/"
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenParsec-debug.apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenParsec-release.apk
          path: app/build/outputs/apk/release/*.apk

  release__nightly:
    name: Nightly Release
    permissions:
      contents: write
    if: inputs.release__nightly || github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    needs: [build-android]
    concurrency:
      group: release__nightly
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Android Release APK
        uses: actions/download-artifact@v4
        with:
          name: OpenParsec-release.apk
      - name: Nightly Release
        uses: andelf/nightly-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            This is a nightly release [created automatically with GitHub Actions workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}).
          files: |
            *.apk
